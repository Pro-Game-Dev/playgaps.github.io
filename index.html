<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayGaps – Mobile Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #1a73e8; color: white; padding: 40px 20px; text-align: center; }
    header h1 { font-size: 2.5em; margin-bottom: 10px; }
    header p { font-size: 1.1em; opacity: 0.9; }
    .games { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .games h2 { font-size: 1.8em; margin-bottom: 20px; }
    .game-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 20px; }
    .game-icon { width: 80px; height: 80px; border-radius: 16px; background: #e8f0fe;
                 display: flex; align-items: center; justify-content: center; font-size: 2em; flex-shrink: 0; }
    .game-info h3 { font-size: 1.2em; margin-bottom: 5px; }
    .game-info p { color: #666; font-size: 0.95em; margin-bottom: 8px; }
    .badge { display: inline-block; background: #e8f0fe; color: #1a73e8;
             padding: 3px 10px; border-radius: 20px; font-size: 0.85em; }
    .play-btn { display: inline-block; margin-top: 10px; background: #1a73e8; color: white;
                padding: 8px 20px; border-radius: 6px; text-decoration: none; font-size: 0.9em; }
    footer { text-align: center; padding: 30px; color: #888; font-size: 0.9em; }
    footer a { color: #1a73e8; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>🎮 PlayGaps</h1>
    <p>Fun mobile games for everyone</p>
  </header>

  <div class="games">
    <h2>Our Games</h2>

    <div class="game-card">
      <div class="game-icon">🧩</div>
      <div class="game-info">
        <h3>Kids Jigsaw Puzzles</h3>
        <p>Fun and educational jigsaw puzzles designed for kids of all ages.</p>
        <span class="badge">📥 1,000+ downloads</span><br>
        <a class="play-btn" href="YOUR_PLAY_STORE_LINK_HERE" target="_blank">View on Play Store</a>
      </div>
    </div>

    <!-- Add more game cards here as you publish more games -->

  </div>

  <footer>
    <p>© 2025 PlayGaps &nbsp;|&nbsp; <a href="/privacy-policy.html">Privacy Policy</a></p>
  </footer>
</body>
</html>
